version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  fanvue:
    build:
      context: .
      dockerfile: Dockerfile.fanvue
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
    working_dir: /app

  of:
    build:
      context: .
      dockerfile: Dockerfile.of
    restart: always
    ports:
      - "127.0.0.1:8001:8001"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
    working_dir: /app

  admin_bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
    working_dir: /app

volumes:
  redis_data:
